# Production profile — NO default fallbacks for credentials.
# Application will fail to start if required env vars are not set.

# Azure Blob Storage (MUST use HTTPS endpoint)
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER}

# RabbitMQ
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}

# Database
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Secure cookies (HTTPS required in production)
server.servlet.session.cookie.secure=true
