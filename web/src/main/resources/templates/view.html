<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('View Image', ~{::content})}">
<body>
    <div th:fragment="content">
        <div class="container">
            <div class="row mb-3">
                <div class="col-12">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/storage}">Images</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${object.name}">Image Name</li>
                        </ol>
                    </nav>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="card-title mb-0" th:text="${object.name}">Image Name</h3>
                    <div>
                        <a th:href="@{'/storage/view/' + ${object.key}}" download class="btn btn-outline-primary btn-sm me-2">
                            <i class="bi bi-download"></i> Download
                        </a>
                        <button type="button" class="btn btn-outline-secondary btn-sm me-2" data-bs-toggle="modal" data-bs-target="#moveImageModal">
                            Move to Folder
                        </button>
                        <form th:action="@{'/storage/delete/' + ${object.key}}" method="post" class="d-inline" 
                              onsubmit="return confirm('Are you sure you want to delete this file?');">
                            <input type="hidden" name="folderId" th:value="${object.folderId}">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
                <div class="card-body text-center">
                    <img th:src="@{'/storage/view/' + ${object.key}}" class="img-fluid" alt="Image preview" style="max-height: 70vh;">
                </div>
                <div class="card-footer">
                    <div class="row">
                        <div class="col-md-3">
                            <strong>Size:</strong> <span th:text="${#numbers.formatDecimal(object.size / 1024, 0, 2) + ' KB'}">0 KB</span>
                        </div>
                        <div class="col-md-4">
                            <strong>Uploaded:</strong> <span th:text="${#temporals.format(object.uploadedAt, 'dd-MM-yyyy HH:mm')}">Date</span>
                        </div>
                        <div class="col-md-5">
                            <strong>Last modified:</strong> <span th:text="${#temporals.format(object.lastModified, 'dd-MM-yyyy HH:mm')}">Date</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Move Image Modal -->
            <div class="modal fade" id="moveImageModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{'/storage/move/' + ${object.key}}" method="post">
                            <input type="hidden" name="fromFolderId" th:value="${object.folderId}">
                            <div class="modal-header">
                                <h5 class="modal-title">Move Image</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Move to:</label>
                                    <select class="form-select" name="targetFolderId">
                                        <option value="">Root (no folder)</option>
                                        <option th:each="f : ${allFolders}" th:value="${f.id}" th:text="${f.name}"
                                                th:selected="${f.id == object.folderId}">Folder</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">Move</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="mt-3">
                <a th:href="${object.folderId != null} ? @{/storage(folderId=${object.folderId})} : @{/storage}" class="btn btn-secondary">Back to Images</a>
            </div>
        </div>
    </div>
</body>
</html>
