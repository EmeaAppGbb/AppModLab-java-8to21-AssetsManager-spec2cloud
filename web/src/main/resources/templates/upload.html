<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Upload Image', ~{::content})}">
<body>
    <div th:fragment="content">
        <h2>Upload Image</h2>

        <!-- Breadcrumb showing target folder -->
        <nav aria-label="breadcrumb" th:if="${currentFolder != null}">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/storage}">Root</a></li>
                <li th:each="crumb : ${breadcrumbs}" th:class="${crumb.id == currentFolder.id} ? 'breadcrumb-item active' : 'breadcrumb-item'">
                    <a th:if="${crumb.id != currentFolder.id}" th:href="@{/storage(folderId=${crumb.id})}" th:text="${crumb.name}">Folder</a>
                    <span th:if="${crumb.id == currentFolder.id}" th:text="${crumb.name}">Folder</span>
                </li>
            </ol>
        </nav>
        <p th:if="${currentFolder != null}" class="text-muted">
            Uploading to folder: <strong th:text="${currentFolder.name}">Folder</strong>
        </p>
        
        <form th:action="@{/storage/upload}" method="post" enctype="multipart/form-data" class="mt-4" id="uploadForm">
            <input type="hidden" name="folderId" th:value="${currentFolderId}">
            <div class="mb-3">
                <label for="file" class="form-label">Select Image</label>
                <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
                <div class="form-text">Supported file types: JPG, PNG, GIF, etc. Maximum size: 10MB</div>
            </div>
            
            <!-- Drag and drop area -->
            <div class="mt-4 mb-4">
                <div id="dropZone" class="border border-dashed border-secondary rounded p-5 text-center">
                    <i class="bi bi-cloud-upload" style="font-size: 2rem;"></i>
                    <p class="mt-2">Drag and drop your image here</p>
                    <p class="text-muted">(or use the file selector above)</p>
                </div>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2" id="uploadBtn">Upload</button>
                <a th:href="${currentFolderId != null} ? @{/storage(folderId=${currentFolderId})} : @{/storage}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <div class="mt-4" id="imagePreview" style="display: none;">
            <h3>Preview</h3>
            <img id="preview" style="max-width: 100%; max-height: 300px;" alt="Image preview">
        </div>

        <style>
            .border-dashed {
                border-style: dashed !important;
            }
            #dropZone {
                transition: all 0.3s ease;
                cursor: pointer;
            }
            #dropZone.dragover {
                background-color: rgba(0, 123, 255, 0.1);
                border-color: #007bff !important;
            }
        </style>

        <script>
            document.getElementById('file').addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    previewFile(file);
                }
            });
            
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('file');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });
            
            dropZone.addEventListener('drop', handleDrop, false);
            
            dropZone.addEventListener('click', function() {
                fileInput.click();
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            function highlight() {
                dropZone.classList.add('dragover');
            }
            
            function unhighlight() {
                dropZone.classList.remove('dragover');
            }
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length > 0) {
                    fileInput.files = files;
                    previewFile(files[0]);
                }
            }
            
            function previewFile(file) {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('preview').src = e.target.result;
                        document.getElementById('imagePreview').style.display = 'block';
                    }
                    reader.readAsDataURL(file);
                }
            }
            
            document.getElementById('uploadForm').addEventListener('submit', function(e) {
                const fileInput = document.getElementById('file');
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    sessionStorage.setItem('uploadSuccess', 'true');
                    sessionStorage.setItem('uploadedKey', file.name);
                }
            });
        </script>
    </div>
</body>
</html>
