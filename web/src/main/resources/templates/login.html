<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asset Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; padding-top: 40px; padding-bottom: 40px; background-color: #f5f5f5; height: 100vh; }
        .form-signin { max-width: 330px; padding: 15px; margin: auto; }
        .form-signin .form-floating:focus-within { z-index: 2; }
    </style>
</head>
<body>
    <main class="form-signin w-100 m-auto text-center">
        <form th:action="@{/login}" method="post">
            <h1 class="h3 mb-3 fw-normal">Asset Manager</h1>
            <p class="text-muted mb-4">Please sign in</p>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out.
            </div>

            <div class="form-floating mb-2">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
                <label for="username">Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
            <p class="mt-3 text-muted">Default: admin / admin</p>
        </form>
    </main>
</body>
</html>
