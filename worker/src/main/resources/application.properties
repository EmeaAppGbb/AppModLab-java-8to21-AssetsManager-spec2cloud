# Azure Blob Storage Configuration
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=https;AccountName=youraccount;AccountKey=yourkey;EndpointSuffix=core.windows.net}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER:assets}

# Application name
spring.application.name=assets-manager-worker

# Azure Service Bus Configuration
azure.servicebus.connection-string=${AZURE_SERVICEBUS_CONNECTION_STRING:Endpoint=sb://yournamespace.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=yourkey}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/assets_manager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true